{% extends 'rango/base.html' %}

{% block title_block %}
Movie Detail
{% endblock %}

{% block body_block %}

<section class="content-page home-page-bg">

    <div class="row-section">

        <h2>{{ movie.title }}</h2>

        <div class="review-tile">

            <div class="review-poster">
                POSTER
            </div>

            <div class="review-text">

                <p>{{ movie.year }}</p>

                <p>
                    {{ movie.description|default:"No description available." }}
                </p>

                <button class="fav-btn"
                        data-movie="{{ movie.id }}">
                    Add to Favourites
                </button>

                <div class="rose-input">

                    <span class="rose">🌹</span>
                    <span class="rose">🌹</span>
                    <span class="rose">🌹</span>
                    <span class="rose">🌹</span>
                    <span class="rose">🌹</span>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
